<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header section containing navigation menu -->
    <section>
        <header>
            <nav>
                <div class="nav_content">
                    <div class="logo"><a href="index.html">NJ STUDIO</a></div>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contacts.html">Contacts</a></li>
                        <li><a href="gallery.html">Gallery</a></li>
                        <li><a href="pricing.html">Pricing</a></li>
                    </ul>
                </div>
            </nav>
        </header>
    </section>

    <!-- Main container for contact information and form -->
    <div style="height: 24px;"></div>
    <div class="container">
        <h1>Contact us</h1>
        <p>We would love to respond to all your quiries and help you understand. Feel free to get in touch with us.</p>

        <div class="contact-box">
            <!-- Contact form section for sending inquiries -->
            <div class="contact-left">
                <h3>Send your request</h3>
                <form>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Name</label>
                            <input type="text" placeholder="John Smith">
                        </div>

                        <div class="input-group">
                            <label>Phone</label>
                            <input type="text" placeholder="0712234543">
                        </div>

                        <div class="input-group">
                            <label>Email</label>
                            <input type="text" placeholder="Johnsmith@gmail.com">
                        </div>

                        <div class="input-group">
                            <label>Subject</label>
                            <input type="text" placeholder="Service">
                        </div>
                    </div>

                    <label>Message</label>
                    <textarea rows="5" placeholder="Your Message"></textarea>
                    <button type="submit">SEND</button>
                </form>
            </div>

            <div class="contact-right">
                <h3>Reach us</h3>
                <table>
                    <tr>
                        <td>Email</td>
                        <td>Contact us @NJSTUDIO@gmail.com</td>
                    </tr>
                    <tr>
                        <td>Phone</td>
                        <td>0812746784</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
<section>
        <div class="footer-container">&COPY;NJ STUDIO 2026</div>
    </section>

</body>
</html>
